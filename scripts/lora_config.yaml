# lora_config.yaml — VoxCPM2 single-speaker LoRA fine-tuning. v2 (r=64).
#
# Changes from v1: r 32->64, alpha 32->128, num_iters/max_steps 1000->1500,
# warmup 100->150. Data and all stability settings unchanged.

# ---- PATHS (yours, under the project root) ----
pretrained_path: /workspace/voxcpm2-lora-pipeline/models/VoxCPM2
train_manifest: /workspace/voxcpm2-lora-pipeline/dataset/train.jsonl
val_manifest: /workspace/voxcpm2-lora-pipeline/dataset/val.jsonl
save_path: /workspace/voxcpm2-lora-pipeline/checkpoints/lora_r64
tensorboard: /workspace/voxcpm2-lora-pipeline/logs/lora_r64
# ---- Sample rates ----
sample_rate: 16000
out_sample_rate: 48000

# ---- Batch / schedule ----
batch_size: 8
grad_accum_steps: 1
num_workers: 2
max_batch_tokens: 4096

num_iters: 1500
max_steps: 1500
log_interval: 10
valid_interval: 500
save_interval: 250

# ---- Optimizer ----
learning_rate: 0.0001
weight_decay: 0.01
warmup_steps: 150

# ---- Loss weights ----
lambdas:
  loss/diff: 1.0
  loss/stop: 1.0

# ---- Anti-overfitting guardrail (do NOT set to 0) ----
training_cfg_rate: 0.1

# ---- LoRA ----
lora:
  enable_lm: true
  enable_dit: true
  enable_proj: false
  r: 64
  alpha: 128
  dropout: 0.0